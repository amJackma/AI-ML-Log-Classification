name: Code Quality Check

on:
  push:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install flake8
      run: |
        pip install flake8

    - name: Run lint check
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics